<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1940" width="1400" height="1940">
<style>
text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Heiti SC', Arial, sans-serif; fill: #111827; }
.title { font-size: 34px; font-weight: 700; }
.subtitle { font-size: 18px; fill: #4b5563; }
.layer { font-size: 22px; font-weight: 700; }
.node-title { font-size: 19px; font-weight: 700; }
.node-sub { font-size: 14px; fill: #4b5563; }
.small { font-size: 13px; fill: #6b7280; }
.box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 10; ry: 10; }
.blue { fill: #eff6ff; stroke: #bfdbfe; }
.green { fill: #f0fdf4; stroke: #bbf7d0; }
.purple { fill: #faf5ff; stroke: #e9d5ff; }
.orange { fill: #fff7ed; stroke: #fed7aa; }
.red { fill: #fef2f2; stroke: #fecaca; }
.side { fill: #ffffff; stroke: #c4b5fd; stroke-width: 2; stroke-dasharray: 8 6; rx: 10; ry: 10; }
.commodity { fill: #ffffff; stroke: #fbbf24; stroke-width: 2; stroke-dasharray: 8 6; rx: 10; ry: 10; }
</style>
<defs>
  <marker id="arrow-blue" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0, 12 4.5, 0 9" fill="#2563eb"/></marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0, 12 4.5, 0 9" fill="#16a34a"/></marker>
  <marker id="arrow-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0, 12 4.5, 0 9" fill="#9333ea"/></marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0, 12 4.5, 0 9" fill="#dc2626"/></marker>
</defs>
<rect width="1400" height="1940" fill="#ffffff"/>
<text x="700" y="56" text-anchor="middle" class="title">光模块产业链全景图谱</text>
<text x="700" y="88" text-anchor="middle" class="subtitle">AI数据中心网络升级：800G/1.6T模块，连接光芯片、电芯片、精密器件、硅光/CPO与下游云厂商</text>

<rect x="75" y="130" width="850" height="350" class="blue box"/>
<text x="105" y="168" class="layer">上游资源、材料与芯片器件</text>
<rect x="115" y="198" width="235" height="82" class="green box"/>
<text x="232" y="227" text-anchor="middle" class="node-title">化合物与硅光材料</text>
<text x="232" y="252" text-anchor="middle" class="node-sub">InP、GaAs、LiNbO3、硅光</text>
<text x="232" y="273" text-anchor="middle" class="node-sub">铟/镓/磷/砷/锗等资源</text>
<rect x="390" y="198" width="235" height="82" class="green box"/>
<text x="507" y="227" text-anchor="middle" class="node-title">光芯片/探测器</text>
<text x="507" y="252" text-anchor="middle" class="node-sub">EML/DFB/VCSEL/PD</text>
<text x="507" y="273" text-anchor="middle" class="node-sub">200G每通道是关键门槛</text>
<rect x="665" y="198" width="220" height="82" class="green box"/>
<text x="775" y="227" text-anchor="middle" class="node-title">电芯片</text>
<text x="775" y="252" text-anchor="middle" class="node-sub">DSP、TIA、Driver、CDR</text>
<text x="775" y="273" text-anchor="middle" class="node-sub">高端DSP海外主导</text>
<rect x="115" y="310" width="235" height="82" class="orange box"/>
<text x="232" y="339" text-anchor="middle" class="node-title">精密光器件</text>
<text x="232" y="364" text-anchor="middle" class="node-sub">FA、透镜、隔离器、滤波片</text>
<text x="232" y="385" text-anchor="middle" class="node-sub">耦合良率和一致性</text>
<rect x="390" y="310" width="235" height="82" class="orange box"/>
<text x="507" y="339" text-anchor="middle" class="node-title">板级与封装材料</text>
<text x="507" y="364" text-anchor="middle" class="node-sub">高速PCB、低损耗CCL</text>
<text x="507" y="385" text-anchor="middle" class="node-sub">树脂、电子布、铜箔、胶材</text>
<rect x="665" y="310" width="220" height="82" class="orange box"/>
<text x="775" y="339" text-anchor="middle" class="node-title">测试与封装设备</text>
<text x="775" y="364" text-anchor="middle" class="node-sub">耦合、贴装、老化、误码</text>
<text x="775" y="385" text-anchor="middle" class="node-sub">客户认证和良率放大</text>
<rect x="250" y="410" width="235" height="48" class="purple box"/>
<text x="367" y="440" text-anchor="middle" class="node-title">A股：源杰、仕佳、天孚、光库</text>
<rect x="520" y="410" width="235" height="48" class="purple box"/>
<text x="637" y="440" text-anchor="middle" class="node-title">相邻：沪电、生益、南亚</text>

<rect x="75" y="565" width="850" height="310" class="blue box"/>
<text x="105" y="603" class="layer">中游光模块与光引擎</text>
<rect x="115" y="635" width="235" height="88" class="blue box"/>
<text x="232" y="666" text-anchor="middle" class="node-title">800G/1.6T可插拔</text>
<text x="232" y="693" text-anchor="middle" class="node-sub">OSFP/QSFP-DD、DR/FR/LR</text>
<text x="232" y="714" text-anchor="middle" class="node-sub">AI数通当前收入主线</text>
<rect x="390" y="635" width="235" height="88" class="blue box"/>
<text x="507" y="666" text-anchor="middle" class="node-title">LPO/LRO/XPO</text>
<text x="507" y="693" text-anchor="middle" class="node-sub">低功耗、少DSP或弱DSP</text>
<text x="507" y="714" text-anchor="middle" class="node-sub">路线仍需客户验证</text>
<rect x="665" y="635" width="220" height="88" class="blue box"/>
<text x="775" y="666" text-anchor="middle" class="node-title">硅光/CPO光引擎</text>
<text x="775" y="693" text-anchor="middle" class="node-sub">交换芯片共封装</text>
<text x="775" y="714" text-anchor="middle" class="node-sub">中长期重构价值分配</text>
<rect x="115" y="755" width="235" height="74" class="purple box"/>
<text x="232" y="785" text-anchor="middle" class="node-title">核心模块厂</text>
<text x="232" y="812" text-anchor="middle" class="node-sub">中际旭创、新易盛</text>
<rect x="390" y="755" width="235" height="74" class="purple box"/>
<text x="507" y="785" text-anchor="middle" class="node-title">挑战者/综合厂</text>
<text x="507" y="812" text-anchor="middle" class="node-sub">联特、剑桥、长芯博创</text>
<rect x="665" y="755" width="220" height="74" class="purple box"/>
<text x="775" y="785" text-anchor="middle" class="node-title">电信/相干补充</text>
<text x="775" y="812" text-anchor="middle" class="node-sub">光迅、德科立等</text>

<rect x="75" y="965" width="850" height="285" class="blue box"/>
<text x="105" y="1003" class="layer">下游网络设备、云厂商与AI集群</text>
<rect x="115" y="1035" width="235" height="88" class="green box"/>
<text x="232" y="1066" text-anchor="middle" class="node-title">AI交换机/NIC</text>
<text x="232" y="1093" text-anchor="middle" class="node-sub">Spectrum-X、以太网/IB</text>
<text x="232" y="1114" text-anchor="middle" class="node-sub">端口速率升级拉动模块</text>
<rect x="390" y="1035" width="235" height="88" class="green box"/>
<text x="507" y="1066" text-anchor="middle" class="node-title">GPU集群/AI工厂</text>
<text x="507" y="1093" text-anchor="middle" class="node-sub">东西向流量和训练推理</text>
<text x="507" y="1114" text-anchor="middle" class="node-sub">800G到1.6T需求核心</text>
<rect x="665" y="1035" width="220" height="88" class="green box"/>
<text x="775" y="1066" text-anchor="middle" class="node-title">电信与骨干网</text>
<text x="775" y="1093" text-anchor="middle" class="node-sub">相干、城域、PON</text>
<text x="775" y="1114" text-anchor="middle" class="node-sub">周期性强于AI数通</text>
<rect x="250" y="1155" width="235" height="58" class="orange box"/>
<text x="367" y="1189" text-anchor="middle" class="node-title">核心指标：客户认证、良率、功耗</text>
<rect x="520" y="1155" width="235" height="58" class="red box"/>
<text x="637" y="1189" text-anchor="middle" class="node-title">风险：价格、路线、CAPEX节奏</text>

<rect x="980" y="130" width="330" height="405" class="side"/>
<text x="1010" y="168" class="layer">相邻基础设施</text>
<text x="1020" y="215" class="node-title">高速PCB/CCL</text>
<text x="1020" y="242" class="node-sub">交换机、NIC和模块内部板卡</text>
<text x="1020" y="292" class="node-title">液冷与电源</text>
<text x="1020" y="319" class="node-sub">AI机柜高密度配套</text>
<text x="1020" y="369" class="node-title">服务器/存储</text>
<text x="1020" y="396" class="node-sub">同源AI资本开支，但非模块主链</text>
<text x="1020" y="446" class="node-title">测试仪器</text>
<text x="1020" y="473" class="node-sub">误码、眼图、老化、可靠性</text>

<rect x="980" y="615" width="330" height="315" class="commodity"/>
<text x="1010" y="653" class="layer">商品背景与待验证</text>
<text x="1020" y="700" class="node-title">铟、镓、磷、砷、锗</text>
<text x="1020" y="727" class="node-sub">资源安全相关，需看转化率</text>
<text x="1020" y="777" class="node-title">石英砂、玻纤、树脂</text>
<text x="1020" y="804" class="node-sub">光纤和板材上游，差异化分化</text>
<text x="1020" y="854" class="node-title">封装胶/金锡焊/陶瓷</text>
<text x="1020" y="881" class="node-sub">影响良率，但A股暴露需料号证明</text>

<path d="M500 480 L500 565" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M500 875 L500 965" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M925 330 C985 330 1000 320 1045 320" stroke="#9333ea" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-purple)"/>
<path d="M925 735 C990 735 1000 770 1045 770" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-red)"/>
<path d="M232 280 L232 635" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
<path d="M507 280 L507 635" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
<path d="M775 280 L775 635" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

<rect x="75" y="1340" width="1235" height="430" class="box"/>
<text x="105" y="1380" class="layer">A股映射：按主链暴露排序</text>
<rect x="115" y="1410" width="245" height="88" class="blue box"/>
<text x="237" y="1442" text-anchor="middle" class="node-title">核心模块厂</text>
<text x="237" y="1469" text-anchor="middle" class="node-sub">中际旭创、新易盛</text>
<rect x="395" y="1410" width="245" height="88" class="green box"/>
<text x="517" y="1442" text-anchor="middle" class="node-title">光芯片/精密器件</text>
<text x="517" y="1469" text-anchor="middle" class="node-sub">源杰、仕佳、天孚、光库</text>
<rect x="675" y="1410" width="245" height="88" class="orange box"/>
<text x="797" y="1442" text-anchor="middle" class="node-title">挑战者/综合厂</text>
<text x="797" y="1469" text-anchor="middle" class="node-sub">光迅、联特、剑桥、长芯博创</text>
<rect x="955" y="1410" width="245" height="88" class="purple box"/>
<text x="1077" y="1442" text-anchor="middle" class="node-title">相邻材料</text>
<text x="1077" y="1469" text-anchor="middle" class="node-sub">沪电、生益、南亚等</text>
<path d="M237 1498 L237 1565 L517 1565" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
<path d="M517 1498 L517 1565 L797 1565" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
<path d="M797 1498 L797 1565 L1077 1565" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
<text x="115" y="1620" class="node-title">读图方法</text>
<text x="115" y="1655" class="node-sub">短期看800G/1.6T客户认证、良率和规模交付；中期看LPO/硅光/CPO是否改变模块价值分配。</text>
<text x="115" y="1685" class="node-sub">DSP和高速模拟电芯片仍是A股映射弱项；光芯片、精密器件和高速板材是国产链条的重点补位。</text>
<text x="115" y="1715" class="node-sub">相邻PCB/液冷/电力受同一AI资本开支拉动，但应与光模块核心排名分开。</text>

<g transform="translate(90,1845)">
  <line x1="0" y1="8" x2="40" y2="8" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="55" y="14" class="small">主链传导</text>
  <line x1="180" y1="8" x2="220" y2="8" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="235" y="14" class="small">关键上游输入</text>
  <line x1="390" y1="8" x2="430" y2="8" stroke="#9333ea" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow-purple)"/>
  <text x="445" y="14" class="small">相邻基础设施</text>
  <line x1="630" y1="8" x2="670" y2="8" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow-red)"/>
  <text x="685" y="14" class="small">约束/待验证</text>
</g>
</svg>
