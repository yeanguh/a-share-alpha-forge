<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股研究报告入口</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --surface: #ffffff;
        --line: #d8ded8;
        --text: #17211b;
        --muted: #65736c;
        --strong: #0f5f45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 6px;
        background: var(--strong);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>A股研究报告服务</h1>
      <p>根路径不直接打开报告页。请进入报告路径查看日报、收盘复盘、周报和产业链分析。</p>
      <a href="./report/">进入 /report/</a>
    </main>
  </body>
</html>
