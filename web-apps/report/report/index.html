<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股研究报告</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="报告筛选">
        <div class="brand">
          <div>
            <h1>A股研究</h1>
            <p id="generatedAt">读取归档中</p>
          </div>
        </div>

        <div class="filters">
          <label class="field">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="日期、板块、股票" />
          </label>

          <div class="field-row">
            <label class="field">
              <span>起始</span>
              <input id="startDate" type="date" />
            </label>
            <label class="field">
              <span>结束</span>
              <input id="endDate" type="date" />
            </label>
          </div>

          <div class="segmented" role="tablist" aria-label="报告类型">
            <button class="segmented-btn active" data-view="daily" type="button">日报</button>
            <button class="segmented-btn" data-view="close" type="button">复盘</button>
            <button class="segmented-btn" data-view="weekly" type="button">周报</button>
            <button class="segmented-btn" data-view="industry" type="button">产业链</button>
          </div>

          <label class="checkline">
            <input id="onlyReviewed" type="checkbox" />
            <span>仅看有收盘复盘日期</span>
          </label>
        </div>

        <div class="list-header">
          <span id="resultCount">0 条</span>
          <button id="resetFilters" type="button">重置</button>
        </div>
        <nav id="dateList" class="date-list" aria-label="日期列表"></nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="activeType">日报</p>
            <h2 id="activeTitle">请选择日期</h2>
          </div>
          <div class="top-actions">
            <button id="copySummary" type="button">复制摘要</button>
          </div>
        </header>

        <section class="metrics" id="metrics"></section>

        <section class="workspace">
          <div class="tabs" role="tablist" aria-label="详情视图">
            <button class="tab active" data-tab="summary" type="button">概要</button>
            <button class="tab" data-tab="markdown" type="button">原文</button>
            <button class="tab" data-tab="data" type="button">结构化</button>
          </div>

          <section id="summaryPanel" class="panel active" aria-label="概要"></section>
          <section id="markdownPanel" class="panel markdown-body" aria-label="原文"></section>
          <section id="dataPanel" class="panel" aria-label="结构化数据"></section>
        </section>
      </main>
    </div>

    <script src="../data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
